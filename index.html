<!DOCTYPE html>
<html lang="ar" dir="rtl">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>📍 FindMe</title>

<link rel="stylesheet" href="style.css">

<link rel="stylesheet"
href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>

<link rel="stylesheet"
href="https://unpkg.com/leaflet-routing-machine/dist/leaflet-routing-machine.css"/>

<link href="https://fonts.googleapis.com/css2?family=Cairo:wght@300;400;600;700;800&display=swap" rel="stylesheet">

<script defer src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

<script defer src="https://unpkg.com/leaflet-routing-machine/dist/leaflet-routing-machine.js"></script>

</head>

<body>

<!-- شاشة البداية -->

<div id="splash">

<h1 id="logo">📍 FindMe</h1>

<p>Professional GPS Navigation</p>

</div>

<!-- Header -->

<header>

<div class="logo">

📍 FindMe

</div>

<div id="speed">

0 km/h

</div>

</header>

<!-- البحث -->

<div class="search-box">

<input
type="text"
id="searchInput"
placeholder="ابحث عن أي مكان...">

<button type="button" onclick="searchPlace()">

🔍

</button>

<button type="button" onclick="clearSearch()">

❌

</button>

</div>

<!-- أزرار الملاحة -->

<div class="nav-buttons">

<button onclick="startNavigation()">

🚗 ابدأ الملاحة

</button>

<button onclick="stopNavigation()">

🛑 إيقاف

</button>

</div>

<!-- معلومات الرحلة -->

<div id="tripInfo">

المسافة: -- | الوقت: --

</div>

<!-- الخريطة -->

<div id="map"></div>

<!-- البوصلة -->

<div id="compass">

<div id="compassArrow">

🧭

</div>

<div id="compassText">

0°

</div>

</div>

<!-- القائمة السفلية -->

<div class="bottom-bar">

<button onclick="goHome()">

🏠

<span>الرئيسية</span>

</button>

<button onclick="centerLocation()">

📍

<span>موقعي</span>

</button>

<button onclick="toggleTraffic()">

🚦

<span>المرور</span>

</button>

<button onclick="toggleVoice()">

🔊

<span>الصوت</span>

</button>

<button onclick="openCompass()">

🧭

<span>البوصلة</span>

</button>

<button onclick="openSettings()">

⚙️

<span>الإعدادات</span>

</button>

</div>

<!-- ملفات JavaScript -->

<script defer src="map.js"></script>
<script defer src="car.js"></script>
<script defer src="speed.js"></script>
<script defer src="search.js"></script>
<script defer src="routing.js"></script>
<script defer src="navigation.js"></script>
<script defer src="alert.js"></script>
<script defer src="voice.js"></script>
<script defer src="traffic.js"></script>
<script defer src="compass.js"></script>
<script defer src="settings.js"></script>

</body>

</html>
