<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FindMe - Professional</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div id="map"></div>

    <div class="ui-container">
        <input type="text" id="search-box" placeholder="إلى أين تريد الذهاب؟">
        
        <div class="bottom-sheet">
            <h3>أهلاً بك في FindMe</h3>
            <p id="location-text">جاري تحديد موقعك...</p>
            
            <div class="controls">
                <button onclick="zoomToUser()">موقعي</button>
                <button class="active">التنقل</button>
            </div>
        </div>
    </div>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script src="map.js"></script>
</body>
</html>
