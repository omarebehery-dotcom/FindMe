<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FindMe</title>

    <link rel="stylesheet" href="style.css">

    <link
        rel="stylesheet"
        href="https://unpkg.com/leaflet/dist/leaflet.css"
    />

    <script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>
</head>
<body>

    <!-- Splash Screen -->
    <div id="splash">
        <h1>FindMe</h1>
        <p>Professional GPS Navigation</p>
    </div>

    <!-- Header -->
    <header>
        <h2>📍 FindMe</h2>

        <div id="speed">
            0 km/h
        </div>
    </header>

    <!-- Map -->
    <div id="map"></div>

    <!-- Bottom Menu -->
    <div class="bottom-bar">

        <button onclick="goHome()">
            🏠
            <span>Home</span>
        </button>

        <button onclick="centerLocation()">
            📍
            <span>GPS</span>
        </button>

        <button onclick="toggleTraffic()">
            🚦
            <span>Traffic</span>
        </button>

        <button onclick="openSettings()">
            ⚙️
            <span>Settings</span>
        </button>

    </div>

    <script src="map.js"></script>

</body>
</html>
