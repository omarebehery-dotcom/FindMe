<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FindMe Maps</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="search-bar">
        <input type="text" id="destination-input" placeholder="ابحث هنا...">
    </div>
    
    <div id="map"></div>

    <div class="fab-container">
        <button onclick="changeMode('DRIVING')">🚗</button>
        <button onclick="changeMode('WALKING')">🚶</button>
        <button onclick="changeMode('BICYCLING')">🚲</button>
    </div>

    <div id="route-info"></div>

    <script src="https://maps.googleapis.com/maps/api/js?key=YOUR_GOOGLE_MAPS_API_KEY&libraries=places,directions"></script>
    <script src="map.js"></script>
</body>
</html>
